services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heyi_am_dev
    ports:
      - "5432:5432"
    volumes:
      - heyi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    command: "server -s3 -s3.config=/etc/seaweedfs/s3.json -filer -dir=/data"
    ports:
      - "8333:8333"   # S3 API
      - "8888:8888"   # Filer Web UI
      - "9333:9333"   # Master
    volumes:
      - heyi_seaweed:/data
      - ./dev/seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9333/cluster/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweed-setup:
    image: amazon/aws-cli
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: heyi_admin
      AWS_SECRET_ACCESS_KEY: heyi_secret_key
    entrypoint: /bin/sh
    command: >
      -c "
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://heyi-am-sessions --region us-east-1 2>/dev/null || true &&
      echo 'Bucket ready'
      "

  phoenix:
    image: hexpm/elixir:1.18.2-erlang-27.2.4-alpine-3.21.3
    working_dir: /app
    stdin_open: true
    tty: true
    command: >
      sh -c "
      apk add --no-cache git build-base inotify-tools &&
      mix local.hex --force &&
      mix local.rebar --force &&
      mix deps.get &&
      mix ecto.create &&
      mix ecto.migrate &&
      iex -S mix phx.server
      "
    environment:
      MIX_ENV: dev
      DATABASE_URL: ecto://postgres:postgres@postgres:5432/heyi_am_dev
      PHX_HOST: localhost
      PHX_IP: "0.0.0.0"
      SECRET_KEY_BASE: dev-only-not-for-production-at-least-64-chars-long-xxxxxxxxxxxxxxxxxx
      OBJECT_STORAGE_HOST: seaweedfs
      OBJECT_STORAGE_PORT: "8333"
      OBJECT_STORAGE_SCHEME: "http://"
      OBJECT_STORAGE_ACCESS_KEY_ID: heyi_admin
      OBJECT_STORAGE_SECRET_ACCESS_KEY: heyi_secret_key
      OBJECT_STORAGE_BUCKET: heyi-am-sessions
      OBJECT_STORAGE_EXTERNAL_HOST: host.docker.internal
    ports:
      - "4000:4000"
    volumes:
      - ./phoenix:/app
      - phoenix_build:/app/_build
      - phoenix_deps:/app/deps
    depends_on:
      postgres:
        condition: service_healthy
      seaweed-setup:
        condition: service_completed_successfully

volumes:
  heyi_pgdata:
  heyi_seaweed:
  phoenix_build:
  phoenix_deps:
